services:
  ko-server:
    build:
      context: .
      dockerfile: Dockerfile.unified
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@${DB_HOST:-postgresql-database-your-coolify-db-host}:5432/ko_server
      BIND_IP: "0.0.0.0"
      BIND_ADDR: "0.0.0.0:15001"
      BASE_PORT: "15100"
      GAME_SERVER_IP: ${GAME_SERVER_IP}
      GAME_SERVER_PORT: "15001"
      MAP_DIR: "./Map"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "15001:15001"
      - "15100-15109:15100-15109"
    networks:
      - coolify

networks:
  coolify:
    external: true
