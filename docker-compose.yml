services:
  login-server:
    build: .
    restart: unless-stopped
    command: ["./ko-login-server"]
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@${DB_HOST:-postgresql-database-your-coolify-db-host}:5432/ko_server
      BIND_IP: "0.0.0.0"
      BASE_PORT: "15100"
      GAME_SERVER_IP: ${GAME_SERVER_IP}
      GAME_SERVER_PORT: "15001"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "15100-15109:15100-15109"
    networks:
      - coolify

  game-server:
    build: .
    restart: unless-stopped
    command: ["./ko-game-server"]
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@${DB_HOST:-postgresql-database-your-coolify-db-host}:5432/ko_server
      BIND_ADDR: "0.0.0.0:15001"
      MAP_DIR: "./Map"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "15001:15001"
    networks:
      - coolify

networks:
  coolify:
    external: true
